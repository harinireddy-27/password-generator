<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>🔐 Password Generator</h2>

    <input type="number" id="length" placeholder="Enter Password Length" min="6" max="30">

    <div class="options">
        <label><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>

        <label><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label>

        <label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>

        <label><input type="checkbox" id="symbols" checked> Symbols (!@#$%)</label>
    </div>

    <button onclick="generatePassword()">Generate Password</button>

    <input type="text" id="password" readonly>

    <button onclick="copyPassword()">Copy Password</button>

    <h3 id="strength"></h3>

</div>

<script src="script.js"></script>

</body>
</html>
